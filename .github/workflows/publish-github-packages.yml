name: Publish to GitHub Packages

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3. Authenticate GitHub Packages
      - name: Authenticate GitHub Packages
        run: |
          dotnet nuget update source github \
            --username Robetinho \
            --password ${{ secrets.GH_PACKAGES_PAT }} \
            --store-password-in-clear-text

      # 4. Determine version (auto-increment patch based on latest nupkg in artifacts)
      - name: Determine version
        id: get_version
        run: |
          latest_nupkg=$(ls ./artifacts/Internal.SDK.*.nupkg 2>/dev/null | sort | tail -n1)
          if [ -z "$latest_nupkg" ]; then
            VERSION="1.0.0"
          else
            filename=$(basename "$latest_nupkg")
            current_version=$(echo "$filename" | sed -E 's/Internal.SDK\.([0-9]+\.[0-9]+\.[0-9]+)\.nupkg/\1/')
            IFS='.' read -r major minor patch <<< "$current_version"
            patch=$((patch + 1))
            VERSION="$major.$minor.$patch"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Determined version: $VERSION"

      # 5. Restore dependencies
      - name: Restore dependencies
        run: dotnet restore --configfile NuGet.config

      # 6. Build project
      - name: Build project
        run: dotnet build Internal.SDK/Internal.SDK.csproj --configuration Release --no-restore

      # 7. Pack project with determined version
      - name: Pack project
        run: dotnet pack Internal.SDK/Internal.SDK.csproj --configuration Release --no-build /p:Version=$VERSION --output ./artifacts

      # 8. Publish package
      - name: Publish package
        run: dotnet nuget push "./artifacts/*.nupkg" --source github --api-key ${{ secrets.GH_PACKAGES_PAT }} --skip-duplicate
