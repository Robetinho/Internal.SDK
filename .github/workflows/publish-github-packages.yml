name: Publish to GitHub Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Authenticate GitHub Packages source
        run: |
          dotnet nuget update source github \
            --username Robetinho \
            --password ${{ secrets.GH_PACKAGES_PAT }} \
            --store-password-in-clear-text

      - name: Determine latest published version
        id: get_version
        run: |
          echo "Fetching latest published version..."
          latest=$(curl -s -u Robetinho:${{ secrets.GH_PACKAGES_PAT }} \
            https://nuget.pkg.github.com/Robetinho/index.json \
            | jq -r '.resources[] | select(.@type=="RegistrationsBaseUrl") | @json') || latest="null"

          if [ "$latest" = "null" ]; then
            echo "No previous package found, starting at 1.0.0"
            echo "VERSION=1.0.0" >> $GITHUB_ENV
          else
            echo "VERSION=1.0.$GITHUB_RUN_NUMBER" >> $GITHUB_ENV
          fi

          echo "Version to publish: $VERSION"

      - name: Restore
        run: dotnet restore --configfile NuGet.config

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: |
          dotnet pack Internal.SDK/Internal.SDK.csproj \
            --configuration Release \
            --no-build \
            /p:Version=$VERSION \
            --output ./artifacts

      - name: Publish package to GitHub Packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source github \
            --api-key ${{ secrets.GH_PACKAGES_PAT }} \
            --skip-duplicate

      - name: Confirm published version
        run: echo "Published version: $VERSION"
