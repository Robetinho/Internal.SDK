name: Publish to GitHub Packages

permissions:
  contents: write   # REQUIRED so the workflow can push version tags

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # IMPORTANT: fetch tags so we can version correctly

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 1️⃣ Auto-increment patch version based on latest vX.Y.Z tag
      - name: Generate new version
        id: version
        run: |
          latest_tag=$(git tag --sort=-v:refname | head -n 1)

          if [[ -z "$latest_tag" ]]; then
            echo "No tags found. Starting at v1.0.0"
            new_version="1.0.0"
          else
            echo "Latest tag found: $latest_tag"

            version="${latest_tag#v}"  # strip leading 'v'
            IFS='.' read -r major minor patch <<< "$version"

            patch=$((patch + 1))
            new_version="${major}.${minor}.${patch}"
          fi

          echo "PACKAGE_VERSION=$new_version" >> $GITHUB_ENV
          echo "New version: $new_version"

      # 2️⃣ Push the new version tag
      - name: Push new tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${{ env.PACKAGE_VERSION }}"
          git push origin "v${{ env.PACKAGE_VERSION }}"

      # 3️⃣ NuGet authentication
      - name: Authenticate GitHub Packages source
        run: |
          dotnet nuget update source github \
            --username Robetinho \
            --password ${{ secrets.GH_PACKAGES_PAT }} \
            --store-password-in-clear-text

      - name: Restore
        run: dotnet restore --configfile NuGet.config

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # 4️⃣ Pack using the new auto-generated version (fixed argument order)
      - name: Pack
        run: dotnet pack --configuration Release --no-build \
             /p:Version="${{ env.PACKAGE_VERSION }}" \
             --output ./artifacts

      # 5️⃣ Push package to GitHub NuGet feed
      - name: Publish package to GitHub Packages
        run: dotnet nuget push "./artifacts/*.nupkg" \
             --source github \
             --api-key ${{ secrets.GH_PACKAGES_PAT }} \
             --skip-duplicate
