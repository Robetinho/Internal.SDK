name: DEBUG Versioning

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 1. Determine version
      - name: Determine version
        run: |
          VERSION="1.0.$GITHUB_RUN_NUMBER"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo ">>> DEBUG: VERSION calculated = $VERSION"

      # 2. Show .csproj contents
      - name: Show csproj
        run: |
          echo ">>> DEBUG: Printing csproj:"
          cat Internal.SDK/Internal.SDK.csproj

      # 3. Restore
      - name: Restore
        run: |
          dotnet restore Internal.SDK/Internal.SDK.csproj --configfile NuGet.config

      # 4. Build
      - name: Build
        run: |
          dotnet build Internal.SDK/Internal.SDK.csproj --configuration Release --no-restore

      # 5. Pack with version
      - name: Pack
        run: |
          echo ">>> DEBUG: Running dotnet pack with version = $VERSION"
          dotnet pack Internal.SDK/Internal.SDK.csproj \
            --configuration Release \
            --no-build \
            /p:Version=$VERSION \
            /p:PackageVersion=$VERSION \
            /v:detailed \
            --output ./artifacts

      # 6. Show artifacts folder contents
      - name: List artifacts
        run: |
          echo ">>> DEBUG: Listing artifacts folder:"
          ls -R ./artifacts

      # 7. Extract nuspec file from .nupkg
      - name: Inspect nupkg
        run: |
          FILE=$(ls ./artifacts/*.nupkg | head -n 1)
          echo ">>> DEBUG: Found nupkg file: $FILE"
          mkdir extracted
          unzip -qq "$FILE" -d extracted
          echo ">>> DEBUG: Contents of .nuspec:"
          cat extracted/*.nuspec
