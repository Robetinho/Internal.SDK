name: Publish to GitHub Packages

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3. Authenticate GitHub Packages source
      - name: Authenticate GitHub Packages
        run: |
          dotnet nuget update source github \
            --username Robetinho \
            --password ${{ secrets.GH_PACKAGES_PAT }} \
            --store-password-in-clear-text

      # 4. Determine version based on latest published package
      - name: Determine version
        id: get_version
        run: |
          echo "Fetching latest published version..."
          latest=$(curl -s -H "Authorization: Bearer ${{ secrets.GH_PACKAGES_PAT }}" \
            https://nuget.pkg.github.com/Robetinho/index.json | \
            jq -r '.packages."Internal.SDK" | keys | sort | last')
          if [ -z "$latest" ] || [ "$latest" = "null" ]; then
            echo "VERSION=1.0.0" >> $GITHUB_ENV
          else
            IFS='.' read -r major minor patch <<< "$latest"
            patch=$((patch + 1))
            echo "VERSION=$major.$minor.$patch" >> $GITHUB_ENV
          fi
          echo "Determined version: $VERSION"

      # 5. Restore dependencies
      - name: Restore dependencies
        run: dotnet restore --configfile NuGet.config

      # 6. Build project
      - name: Build project
        run: dotnet build Internal.SDK/Internal.SDK.csproj --configuration Release --no-restore

      # 7. Pack project with determined version
      - name: Pack project
        run: dotnet pack Internal.SDK/Internal.SDK.csproj --configuration Release --no-build /p:Version=$VERSION --output ./artifacts

      # 8. Publish package to GitHub Packages
      - name: Publish package
        run: dotnet nuget push "./artifacts/*.nupkg" --source github --api-key ${{ secrets.GH_PACKAGES_PAT }} --skip-duplicate
